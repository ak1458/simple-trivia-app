<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="An interactive joke page with a dodging No button">
    <title>A Simple Question...</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="icon" aria-hidden="true">
                <iframe src="https://tenor.com/embed/10532535631716456360" width="100%" height="100%" frameBorder="0"
                    allowfullscreen></iframe>
            </div>
            <div class="title-block">
                <h1 class="title">A Simple Question</h1>
                <p class="subtitle">Sometimes the simplest questions require the most thought...</p>
            </div>
        </div>

        <div class="playground" id="playground">
            <p class="question">Do you love me?</p>
            <div class="button-container">
                <button class="btn-yes" id="btnYes" aria-label="Answer Yes">Yes! 💖</button>
                <button class="btn-no" id="btnNo" aria-label="Answer No">No</button>
            </div>
        </div>

        <p class="hint">Try clicking either button... if you can 😉</p>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal">
            <button class="modal-close" id="modalClose" aria-label="Close dialog">&times;</button>
            <div class="modal-icon" id="modalIcon">🎉</div>
            <h2 class="modal-title" id="modalTitle">Yay!</h2>
            <p class="modal-message" id="modalMessage">I knew you'd say yes! 💕</p>
            <button class="modal-button" id="modalButton">Close</button>
        </div>
    </div>

    <div id="preloadContainer"
        style="position: absolute; width: 0; height: 0; overflow: hidden; opacity: 0; pointer-events: none;"></div>
    <script src="script.js"></script>
</body>

</html>
